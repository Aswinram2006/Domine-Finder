<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recommendation Result</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent-gradient: linear-gradient(135deg, #38bdf8, #818cf8);
            --border-color: #334155;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .wrapper {
            background-color: var(--card-bg);
            padding: 2.5rem;
            border-radius: 16px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3), 0 8px 10px -6px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 450px;
            border: 1px solid var(--border-color);
            text-align: center;
        }

        h1 {
            margin-top: 0;
            font-size: 1.1rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--text-muted);
            margin-bottom: 1.5rem;
        }

        /* The glowing result container */
        .result-box {
            background: rgba(56, 189, 248, 0.05);
            border: 2px solid #38bdf8;
            border-radius: 12px;
            padding: 2rem 1.5rem;
            margin-bottom: 2rem;
            box-shadow: 0 0 20px rgba(56, 189, 248, 0.15);
            animation: pulse Glow 3s infinite alternate;
        }

        .result-box h2 {
            margin: 0;
            font-size: 2.2rem;
            font-weight: 700;
            background: var(--accent-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.5px;
        }

        /* Secondary Button to go back */
        .back-btn {
            display: inline-block;
            width: 100%;
            box-sizing: border-box;
            padding: 14px;
            background-color: #111827;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            color: var(--text-main);
            font-size: 1rem;
            font-weight: 600;
            text-decoration: none;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .back-btn:hover {
            border-color: #64748b;
            background-color: #1e293b;
            transform: translateY(-1px);
        }

        .back-btn:active {
            transform: scale(0.98);
        }
    </style>
</head>
<body>

    <div class="wrapper">
        <h1>Domain Recommendations</h1>

        <div class="result-box">
            <p style="color:#38bdf8; font-weight:600; margin-bottom:10px;">
                🥇 Primary Recommendation
            </p>

            <h2>{{ primary }}</h2>
        </div>

        <div class="result-box">
            <p style="color:#818cf8; font-weight:600; margin-bottom:10px;">
                🥈 Alternative Recommendation
            </p>

            <h2>{{ secondary }}</h2>
        </div>

        <a href="/" class="back-btn">
            Test Another Skillset
        </a>

    </div>

</body>
